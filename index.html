r<!DOCTYPE html>
<html>
<head>
    <title>My First HTML Page</title>
    <script>
        function redirectBasedOnUA() {
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            if (/android|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(userAgent.toLowerCase())) {
                // 如果是移动设备
                window.location.href = ' https://dongguacc.github.io/FurryShiJiu/p/m';
            } else {
                // 如果是桌面设备
                window.location.href = ' https://dongguacc.github.io/FurryShiJiu/error';
            }
        }
        // 在页面加载时立即执行检测并重定向
        window.onload = redirectBasedOnUA;
    </script>
</head>

</body>
</html>
